name: {{WORKSPACE_NAME}}
version: 0.1.0
description: "AI workspace powered by AI Barracks"

models:
  primary: claude-opus-4-6
  fallback:
    - gemini-3.1-pro
    - gpt-5.3

memory:
  sessions: sessions/
  wiki: wiki/

hooks:
  session_start: "aib hook start {client}"
  session_end: "aib hook end {client}"

skills:
  discovery: auto       # auto: skills/ 자동 스캔 | explicit: enabled 리스트만
  enabled:              # discovery=explicit일 때 활성 슬러그. auto일 땐 무시
    - council

compliance:
  session_retention: permanent
  wiki_retention: permanent

aib_version: {{AIB_VERSION}}
